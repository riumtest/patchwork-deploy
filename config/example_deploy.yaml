# Example patchwork-deploy configuration
# Copy and adjust for your environment.

patch_dir: ./patches
state_file: ./deploy-state.json
timeout: 30s

hosts:
  - address: "192.168.1.10:22"
    user: deploy
    key_path: ~/.ssh/id_rsa

  - address: "192.168.1.11:22"
    user: deploy
    key_path: ~/.ssh/id_rsa

# Quota settings (optional):
# quota:
#   max_patches: 10   # max patches applied per run (0 = unlimited)
#   warn_at: 5        # warn when pending count reaches this threshold

# Retry settings (optional):
# retry:
#   max_attempts: 3
#   delay: 2s

# Throttle settings (optional):
# throttle:
#   delay: 500ms
